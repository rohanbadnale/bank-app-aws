<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishanvi Gramin Bank | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="login-container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="brand-content">

            <div class="logo-circle">
                🏦
            </div>

            <h2>Vaishanvi<br>Gramin Bank</h2>

            <p>
                Secure • Smart • Trusted Banking
            </p>

            <img
                src="{{ url_for('static', filename='images/bank.jpg') }}"
                alt="Vaishanvi Gramin Bank"
                class="img-fluid">

            <div class="feature-box mt-4">

                <div class="feature mb-2">
                    <i class="bi bi-shield-check"></i>
                    Secure Banking
                </div>

                <div class="feature mb-2">
                    <i class="bi bi-cloud-check"></i>
                    AWS Cloud Hosted
                </div>

                <div class="feature">
                    <i class="bi bi-cash-stack"></i>
                    Fast Money Transfer
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div class="login-card">

            <h2>Welcome Back 👋</h2>

            <p>Login to continue your banking journey</p>

            <form method="POST">

                <!-- EMAIL -->

                <div class="input-group mb-3">

                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter Email"
                        required>

                </div>

                <!-- PASSWORD -->

                <div class="input-group mb-4">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter Password"
                        required>

                    <button
                        class="btn btn-light"
                        type="button"
                        onclick="togglePassword()">

                        <i
                            class="bi bi-eye"
                            id="eyeIcon">
                        </i>

                    </button>

                </div>

                <button
                    class="btn login-btn"
                    type="submit">

                    <i class="bi bi-box-arrow-in-right"></i>
                    Secure Login

                </button>

            </form>

            <div class="text-center mt-4">

                New Customer?

                <a href="{{ url_for('register') }}">
                    Create Account
                </a>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

let password=document.getElementById("password");
let icon=document.getElementById("eyeIcon");

if(password.type==="password"){

password.type="text";

icon.classList.remove("bi-eye");

icon.classList.add("bi-eye-slash");

}
else{

password.type="password";

icon.classList.remove("bi-eye-slash");

icon.classList.add("bi-eye");

}

}

</script>

</body>
</html>
