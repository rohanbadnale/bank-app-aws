<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card">

<div class="card-body">

<h2 class="text-center mb-4">
Create Account
</h2>

<form method="POST">

<div class="mb-3">
<input
type="text"
name="fullname"
class="form-control"
placeholder="Full Name"
required>
</div>

<div class="mb-3">
<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>
</div>

<div class="mb-3">
<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>
</div>

<button class="btn btn-success w-100">
Register
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
