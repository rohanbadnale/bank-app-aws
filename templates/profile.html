<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | Vaishnavi Gramin Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/profile.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="profile-card">

        <form method="POST">

            <div class="text-center">

                <img src="{{ url_for('static', filename='images/default-user.png') }}"
                     class="profile-image">

                <h2>{{ user.fullname }}</h2>

                <p>{{ user.email }}</p>

            </div>

            <hr>

            <div class="row">

                <div class="col-md-6">

                    <label>Full Name</label>

                    <input
                        type="text"
                        name="fullname"
                        class="form-control"
                        value="{{ user.fullname }}">

                </div>

                <div class="col-md-6">

                    <label>Phone</label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ user.phone }}">

                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-6">

                    <label>Account Number</label>

                    <input
                        class="form-control"
                        value="{{ user.account_number }}"
                        readonly>

                </div>

                <div class="col-md-6">

                    <label>IFSC</label>

                    <input
                        class="form-control"
                        value="{{ user.ifsc_code }}"
                        readonly>

                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-6">

                    <label>UPI ID</label>

                    <input
                        class="form-control"
                        value="{{ user.upi_id }}"
                        readonly>

                </div>

                <div class="col-md-6">

                    <label>Email</label>

                    <input
                        class="form-control"
                        value="{{ user.email }}"
                        readonly>

                </div>

            </div>

            <br>

            <label>Address</label>

            <textarea
                class="form-control"
                rows="3"
                name="address">{{ user.address }}</textarea>

            <br>

            <button
                class="btn btn-primary">

                <i class="bi bi-check-circle"></i>

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>

</html>
